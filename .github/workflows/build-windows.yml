name: Build Windows MAUI (unsigned)
on:
  push:
    paths:
      - 'Aurora.App/**'
      - 'Aurora.Logic/**'
      - 'Aurora.Components/**'
      - 'Aurora.Importer/**'
      - 'lib/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PROJECT: Aurora.App/Aurora.App.csproj
    strategy:
      matrix:
        runtime: [win-x64, win-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.101'

      - name: Install MAUI workloads
        run: dotnet workload install maui --version 10.0.101.1

      - name: Show SDK toolchain
        run: dotnet --info

      - name: Restore
        shell: bash
        run: dotnet restore "$PROJECT"

      - name: Publish (${{ matrix.runtime }})
        shell: bash
        run: |
          dotnet publish "$PROJECT" \
            -f net10.0-windows10.0.19041.0 \
            -r ${{ matrix.runtime }} \
            -c Release \
            -o publish/${{ matrix.runtime }}

      - name: List publish output
        shell: bash
        run: ls -la "publish/${{ matrix.runtime }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-publish-${{ matrix.runtime }}
          path: publish/${{ matrix.runtime }}
